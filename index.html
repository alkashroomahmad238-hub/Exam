<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار الكيمياء - AJK</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 100px; color: rgba(0,0,0,0.05); z-index: -1; pointer-events: none; }
        .box { background: white; padding: 30px; border-radius: 15px; max-width: 700px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .q-card { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { background: #2c3e50; color: white; padding: 15px; border: none; width: 100%; border-radius: 5px; cursor: pointer; font-size: 18px; }
        .correct { color: green; font-weight: bold; }
        .wrong { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="watermark">AJK</div>
    <div class="box">
        <h1>اختبار الكيمياء المكثف</h1>
        <button onclick="gen()">بدء اختبار جديد</button>
        <div id="q-container"></div>
    </div>

    <script>
        const bank = [
            {q: "ما هي القوى التي تنشأ بين الجزيئات غير القطبية؟", o: ["لندن", "هيدروجينية", "أيونية", "تساهمية"], a: "لندن"},
            {q: "ماذا يسمى المحلول الذي يحتوي على أكبر كمية مذاب؟", o: ["مشبع", "غير مشبع", "فوق مشبع", "مركز"], a: "مشبع"},
            {q: "ما هو رمز ثابت الاتزان؟", o: ["Kc", "Kp", "pH", "pOH"], a: "Kc"},
            {q: "عملية فقد الإلكترونات تسمى؟", o: ["تأكسد", "اختزال", "ترسيب", "تعادل"], a: "تأكسد"},
            {q: "ما هو ناتج أكسدة الكحول الأولي؟", o: ["ألدهيد", "حمض", "إيثر", "ألكين"], a: "ألدهيد"}
            // يمكنك إضافة المزيد هنا بنفس التنسيق
        ];

        function check(btn, correct, options) {
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            
            if(btn.innerText === correct) {
                btn.style.backgroundColor = "#27ae60";
                btn.innerHTML += " ✅ صح";
            } else {
                btn.style.backgroundColor = "#c0392b";
                btn.innerHTML += " ❌ خطأ";
            }
        }

        function gen() {
            let container = document.getElementById('q-container');
            container.innerHTML = "<h3>اختر الإجابة الصحيحة:</h3>";
            bank.sort(() => 0.5 - Math.random()).slice(0, 5).forEach((item, i) => {
                let opts = item.o.map(o => `<button onclick="check(this, '${item.a}')">${o}</button>`).join('');
                container.innerHTML += `<div class="q-card"><p>${i+1}. ${item.q}</p><div class="options">${opts}</div></div>`;
            });
        }
    </script>
</body>
</html>
