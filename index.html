<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار الكيمياء - AJK</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #34495e; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin-top: 10px; }
        #admin-panel { display: none; background: #eee; padding: 15px; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="box" id="quiz">
        <h1>اختبار الكيمياء</h1>
        <button onclick="startQuiz()">بدء الاختبار</button>
        <button onclick="toggleAdmin()" style="background:#7f8c8d; font-size:12px;">إعدادات المطور</button>
        
        <div id="admin-panel">
            <h3>إعدادات الاختبار</h3>
            <input type="number" id="q-limit" placeholder="عدد الأسئلة (مثلاً 5)">
            <button onclick="saveLimit()" style="background:#2980b9;">حفظ عدد الأسئلة</button>
            <hr>
            <textarea id="q-input" placeholder='{"q":"سؤال؟", "o":["أ","ب","ج","د"], "a":"أ"}' style="width:100%; height:80px;"></textarea>
            <button onclick="addQuestion()" style="background:#27ae60;">إضافة سؤال جديد</button>
            <button onclick="clearData()" style="background:#c0392b;">مسح الكل</button>
        </div>
    </div>

    <script>
        let bank = JSON.parse(localStorage.getItem('myQuizData')) || [];
        let limit = localStorage.getItem('qLimit') || 5;

        function toggleAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
        
        function saveLimit() {
            localStorage.setItem('qLimit', document.getElementById('q-limit').value);
            alert("تم حفظ عدد الأسئلة!");
        }

        function addQuestion() {
            try {
                bank.push(JSON.parse(document.getElementById('q-input').value));
                localStorage.setItem('myQuizData', JSON.stringify(bank));
                alert("تم إضافة السؤال!");
            } catch(e) { alert("خطأ في التنسيق!"); }
        }

        function clearData() { localStorage.clear(); location.reload(); }

        function startQuiz() {
            let qLimit = parseInt(localStorage.getItem('qLimit')) || 5;
            let shuffled = bank.sort(() => 0.5 - Math.random()).slice(0, qLimit);
            let currentQ = 0, score = 0;
            
            function showQ() {
                let item = shuffled[currentQ];
                let html = `<h3>سؤال ${currentQ + 1}:</h3><p>${item.q}</p>`;
                item.o.forEach(opt => html += `<button onclick="check(this, '${item.a}')">${opt}</button>`);
                document.getElementById('quiz').innerHTML = html;
            }

            window.check = function(btn, correct) {
                if(btn.innerText === correct) score++;
                currentQ++;
                if(currentQ < shuffled.length) showQ();
                else document.getElementById('quiz').innerHTML = `<h1>نتيجتك: ${score}/${shuffled.length}</h1><button onclick='location.reload()'>عودة</button>`;
            };
            showQ();
        }
    </script>
</body>
</html>
