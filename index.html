<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار الكيمياء - AJK</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        .logo { font-size: 40px; font-weight: bold; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #2c3e50; display: inline-block; padding: 0 20px; }
        .box { background: white; padding: 30px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .options { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        button { background: #34495e; color: white; padding: 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        #next-btn { display: none; background: #2980b9; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="logo">AJK</div>
    <div class="box" id="quiz">
        <h1>اختبار الكيمياء المكثف</h1>
        <button onclick="startQuiz()">بدء الاختبار</button>
    </div>

    <script>
        const bank = [
            {q: "عملية فقد الإلكترونات تسمى؟", o: ["تأكسد", "اختزال", "ترسيب", "تعادل"], a: "تأكسد"},
            {q: "ما هو ناتج أكسدة الكحول الأولي؟", o: ["ألدهيد", "حمض", "إيثر", "ألكين"], a: "ألدهيد"},
            {q: "العامل الحفاز يقلل من؟", o: ["طاقة التنشيط", "سرعة التفاعل", "التركيز", "الحجم"], a: "طاقة التنشيط"},
            {q: "ما هي قيمة pH للمحلول المتعادل؟", o: ["7", "أقل من 7", "أكبر من 7", "0"], a: "7"}
        ];
        
        let currentQ = 0, score = 0;
        function startQuiz() { currentQ = 0; score = 0; showQ(); }
        
        function showQ() {
            let item = bank[currentQ];
            let html = `<h3>سؤال ${currentQ + 1} من ${bank.length}:</h3><p style="font-size:18px">${item.q}</p><div class="options">`;
            item.o.forEach(o => { html += `<button onclick="check(this, '${item.a}')">${o}</button>`; });
            html += `</div><button id="next-btn" onclick="nextQ()">السؤال التالي</button>`;
            document.getElementById('quiz').innerHTML = html;
        }

        function check(btn, correct) {
            let btns = document.querySelectorAll('.options button');
            btns.forEach(b => {
                b.disabled = true;
                if(b.innerText === correct) { b.style.backgroundColor = "#27ae60"; if(btn === b) score++; }
                else if(b === btn) b.style.backgroundColor = "#c0392b";
            });
            document.getElementById('next-btn').style.display = "block";
        }

        function nextQ() {
            currentQ++;
            if(currentQ < bank.length) showQ();
            else {
                let msg = score === bank.length ? "جيد جداً! ممتاز" : (score > bank.length/2 ? "جيد" : "سيئ، تحتاج مراجعة");
                document.getElementById('quiz').innerHTML = `<h1>نتيجتك: ${score}/${bank.length}</h1><p style="font-size:24px">${msg}</p><button onclick='startQuiz()'>إعادة الاختبار</button>`;
            }
        }
    </script>
</body>
</html>
